name: Daily job data update

on:
  schedule:
    # 06:15 UTC daily — adjust cron as you like
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch raw jobs
        env:
          API_ID: ${{ secrets.API_ID }}
          API_KEY: ${{ secrets.API_KEY }}
        run: python scripts/fetch_jobs.py

      - name: Clean jobs
        run: python scripts/clean_jobs.py

      - name: Update SQLite database
        run: python scripts/update_database.py

      - name: Commit and push data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs.db data/raw_jobs.csv data/raw_jobs.json data/clean_jobs.csv
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: daily job data update [skip ci]"
            git push
          fi
